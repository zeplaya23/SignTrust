server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── MIME types (include defaults + .mjs) ──
    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }

    # ── Client body size (document uploads) ──
    client_max_body_size 50M;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: blob:; frame-ancestors 'self';" always;

    # ──────────────────────────────────────────
    # Mailpit (must come BEFORE /api/ catch-all)
    # ──────────────────────────────────────────

    # Mailpit UI
    location /mailpit/ {
        proxy_pass http://signtrust-mailpit:8025/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Mailpit static assets
    location /dist/ {
        proxy_pass http://signtrust-mailpit:8025/dist/;
        proxy_set_header Host $host;
    }

    # SignTrust Admin API (/api/v1/admin/*)
    location /api/v1/admin/ {
        proxy_pass http://signtrust-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Mailpit API + WebSocket events (longer prefix wins over /api/)
    location /api/v1/ {
        proxy_pass http://signtrust-mailpit:8025/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/events {
        proxy_pass http://signtrust-mailpit:8025/api/events;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # ──────────────────────────────────────────
    # SignTrust API (/api/auth, /api/envelopes, etc.)
    # ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://signtrust-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50M;
    }

    # ── Quarkus health / dev endpoints ──
    location /q/ {
        proxy_pass http://signtrust-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static assets with long cache ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SuperAdmin Console (/admin/*) ──
    # Serves the admin SPA and falls back to its index.html for client routing
    location /admin/ {
        alias /usr/share/nginx/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Admin SPA static assets
    location /admin/assets/ {
        alias /usr/share/nginx/admin/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA routing: fallback to index.html ──
    # index.html must never be cached — it references hashed assets
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
        try_files $uri $uri/ /index.html;
    }
}
