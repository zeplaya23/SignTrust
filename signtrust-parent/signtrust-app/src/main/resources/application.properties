# =============================================================
# SignTrust — Configuration Quarkus (dev profile)
# =============================================================

# --- Application ---
quarkus.application.name=signtrust
quarkus.application.version=1.0.0-SNAPSHOT

# --- HTTP ---
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3020,http://localhost:5173,http://localhost:5175,http://158.220.112.175:5175
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-tenant-id
quarkus.http.cors.exposed-headers=location
quarkus.http.cors.access-control-max-age=24H

# --- Datasource (MySQL on trust-net) ---
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://trust-mysql:3306/signtrust_db?characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
quarkus.datasource.username=${SIGNTRUST_DB_USER:signtrust}
quarkus.datasource.password=${SIGNTRUST_DB_PASSWORD:ChangeMeSignTrustP@ss2024}
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=5

# --- Hibernate ORM ---
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- OIDC / Keycloak ---
quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://trust-keycloak:8080/auth}/realms/signtrust
quarkus.oidc.client-id=signtrust-api
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:change-me-secret}
quarkus.oidc.tls.verification=none
quarkus.oidc.token.issuer=any

# --- Auth Permissions (public endpoints) ---
quarkus.http.auth.permission.public.paths=/api/auth/*,/api/payments/*,/api/sign/*,/api/status,/q/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.proactive=false

# --- Keycloak Admin Client ---
quarkus.keycloak.admin-client.server-url=${KEYCLOAK_URL:http://trust-keycloak:8080/auth}
quarkus.keycloak.admin-client.realm=master
quarkus.keycloak.admin-client.client-id=admin-cli
quarkus.keycloak.admin-client.username=${KEYCLOAK_ADMIN:admin}
quarkus.keycloak.admin-client.password=${KEYCLOAK_ADMIN_PASSWORD:ChangeMeKcAdminP@ss2024}
quarkus.keycloak.admin-client.grant-type=PASSWORD

# --- SignTrust Keycloak config ---
signtrust.keycloak.server-url=${KEYCLOAK_URL:http://trust-keycloak:8080/auth}
signtrust.keycloak.admin-username=${KEYCLOAK_ADMIN:admin}
signtrust.keycloak.admin-password=${KEYCLOAK_ADMIN_PASSWORD:ChangeMeKcAdminP@ss2024}

# --- MinIO (S3) ---
signtrust.storage.endpoint=${MINIO_ENDPOINT:http://signtrust-minio:9000}
signtrust.storage.access-key=${MINIO_ROOT_USER:signtrust-admin}
signtrust.storage.secret-key=${MINIO_ROOT_PASSWORD:ChangeMeMinioP@ss2024}
signtrust.storage.bucket-prefix=signtrust-

# --- EJBCA ---
signtrust.ejbca.url=${EJBCA_URL:https://trust-ejbca-pki:8443}
signtrust.ejbca.ca-name=SubCA-AuguraTechnologiesDev
signtrust.ejbca.cert-profile=SigningWithRevocation
signtrust.ejbca.ee-profile=SigningEE

# --- DSS ---
signtrust.dss.url=${DSS_URL:http://trust-dss:8080}

# --- TSA ---
signtrust.tsa.url=http://trust-ejbca-tsa:8080/ejbca/publicweb/apply/tsa

# --- Mailer (Mailpit for dev) ---
quarkus.mailer.from=noreply@signtrust.ci
quarkus.mailer.host=${SMTP_HOST:signtrust-mailpit}
quarkus.mailer.port=${SMTP_PORT:1025}
quarkus.mailer.start-tls=DISABLED
quarkus.mailer.login=DISABLED

# --- Paystack ---
signtrust.paystack.secret-key=${PAYSTACK_SECRET_KEY:sk_test_xxx}
signtrust.paystack.base-url=https://api.paystack.co

# --- OpenAPI / Swagger ---
quarkus.smallrye-openapi.info-title=SignTrust API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Plateforme de Signature Electronique Multi-tenant

# --- Health ---
quarkus.smallrye-health.root-path=/q/health

# --- Container Image ---
quarkus.container-image.group=cryptoneo
quarkus.container-image.name=signtrust
quarkus.container-image.tag=${quarkus.application.version}

# --- Logging ---
quarkus.log.level=INFO
quarkus.log.category."ci.cryptoneo.signtrust".level=DEBUG
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
